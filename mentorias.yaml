apiVersion: apps/v1
kind: Deployment
metadata:
  name: mentorias
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels: { app: mentorias }
  template:
    metadata:
      labels: { app: mentorias }
    spec:
      containers:
        - name: mentorias
          image: mentorias:1.0.0
          imagePullPolicy: IfNotPresent
          env:
            - { name: RUN_ENV, value: "CLUSTER" }

            # Django / Email (Secret separado da BD)
            - { name: DJANGO_SECRET_KEY, valueFrom: { secretKeyRef: { name: mentorias-secret, key: DJANGO_SECRET_KEY } } }
            - { name: EMAIL_HOST_USER,  valueFrom: { secretKeyRef: { name: mentorias-secret, key: EMAIL_HOST_USER } } }
            - { name: EMAIL_HOST_PASSWORD, valueFrom: { secretKeyRef: { name: mentorias-secret, key: EMAIL_HOST_PASSWORD } } }

            # Base de dados (reutiliza o Service "mysql" já existente)
            - { name: MYSQL_DATABASE, valueFrom: { secretKeyRef: { name: mentorias-db-secret, key: MYSQL_DATABASE } } }
            - { name: MYSQL_USER,     valueFrom: { secretKeyRef: { name: mentorias-db-secret, key: MYSQL_USER } } }
            - { name: MYSQL_PASSWORD, valueFrom: { secretKeyRef: { name: mentorias-db-secret, key: MYSQL_PASSWORD } } }
            - { name: MYSQL_HOST,     value: "mysql" }
            - { name: MYSQL_PORT,     value: "3306" }

          ports:
            - containerPort: 8000
          readinessProbe:
            tcpSocket: { port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: mentorias
  namespace: demo
spec:
  selector: { app: mentorias }
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000
